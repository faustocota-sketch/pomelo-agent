<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Facturas - Pomelo Derma</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:#f0fdf4;padding:16px}
h1{color:#15803d;font-size:1.4rem;text-align:center;margin-bottom:20px}
.card{background:#fff;border-radius:16px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin-bottom:16px}
.btn{display:block;width:100%;padding:14px;border-radius:12px;border:none;font-size:1rem;font-weight:600;cursor:pointer;margin-top:8px}
.bg{background:#16a34a;color:#fff}
.bb{background:#2563eb;color:#fff}
.bc{background:#e5e7eb;color:#374151}
#fi{display:none}
#pv{display:none;width:100%;border-radius:12px;margin-top:12px}
#ba{display:none}
.st{text-align:center;padding:12px;border-radius:8px;font-weight:500;margin-top:12px;display:none}
.sc{background:#fef9c3;color:#854d0e}
.so{background:#dcfce7;color:#15803d}
.se{background:#fee2e2;color:#dc2626}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ii{background:#f9fafb;border-radius:8px;padding:10px}
.il{font-size:.75rem;color:#6b7280;margin-bottom:2px}
.iv{font-weight:600;color:#111827}
table{width:100%;border-collapse:collapse;font-size:.82rem;margin-top:12px}
th{background:#15803d;color:#fff;padding:8px;text-align:left}
td{padding:8px;border-bottom:1px solid #e5e7eb}
tr:nth-child(even){background:#f9fafb}
.tr td{font-weight:700;background:#dcfce7}
.ac{display:flex;gap:8px;margin-top:12px}
.ac .btn{margin-top:0}
</style>
</head>
<body>
<h1>Lector de Facturas</h1>

<div class="card" id="zc">
  <p style="color:#6b7280;margin-bottom:12px;text-align:center">Toma foto de la factura del proveedor</p>
  <button class="btn bg" onclick="abrirCamara()">Tomar Foto</button>
  <button class="btn bc" onclick="document.getElementById('fi').click()">Elegir Imagen</button>
  <button class="btn bc" onclick="document.getElementById('fi2').click()">Subir XML / PDF</button>
  <input type="file" id="fi" accept="image/*" onchange="cargar(this)">
  <input type="file" id="fi2" accept=".xml,.pdf" onchange="cargar(this)" style="display:none">
<input type="file" id="fi2" accept=".xml,.pdf,application/xml,text/xml" onchange="cargar(this)" multiple style="display:none">
  <img id="pv" alt="preview">
  <button class="btn bb" id="ba" onclick="analizar()">Analizar con IA</button>
  <div id="sa" class="st"></div>
</div>

<div class="card" id="zr" style="display:none">
  <h2 style="color:#15803d;margin-bottom:12px">Factura Detectada</h2>
  <div class="ig" id="ig"></div>
  <div style="overflow-x:auto">
    <table>
      <thead><tr><th>Producto</th><th>Cant</th><th>P.Unit</th><th>Subtotal</th></tr></thead>
      <tbody id="tb"></tbody>
      <tfoot>
        <tr class="tr"><td colspan="3">Subtotal</td><td id="ts"></td></tr>
        <tr class="tr"><td colspan="3">IVA</td><td id="ti"></td></tr>
        <tr class="tr"><td colspan="3">TOTAL</td><td id="tt"></td></tr>
      </tfoot>
    </table>
  </div>
  <div class="ac">
    <button class="btn bg" onclick="confirmar()">Confirmar en Odoo</button>
    <button class="btn bc" onclick="reiniciar()">Nueva Factura</button>
  </div>
  <div id="sc" class="st"></div>
</div>

<script>
var b64 = null, mt = 'image/jpeg', dat = null;

function abrirCamara() {
    var i = document.createElement('input');
    i.type = 'file';
    i.accept = 'image/*';
    i.capture = 'environment';
    i.onchange = function() { cargar(i); };
    i.click();
}

function cargar(inp) {
    var f = inp.files[0];
    if (!f) return;
    mt = f.type || 'image/jpeg';
    var r = new FileReader();
    r.onload = function(e) {
        b64 = e.target.result.split(',')[1];
        document.getElementById('pv').src = e.target.result;
        document.getElementById('pv').style.display = 'block';
        document.getElementById('ba').style.display = 'block';
    };
    r.readAsDataURL(f);
}

function fmt(n) {
    return n ? '$' + parseFloat(n).toLocaleString('es-MX', {minimumFractionDigits:2}) : '$0.00';
}

async function analizar() {
    if (!b64) { alert('Selecciona imagen primero'); return; }
    var e = document.getElementById('sa');
    e.className = 'st sc';
    e.style.display = 'block';
    e.textContent = 'Analizando con Claude Vision...';
    document.getElementById('ba').disabled = true;
    try {
        var fd = new FormData();
        var a = atob(b64), u = new Uint8Array(a.length);
        for (var i = 0; i < a.length; i++) u[i] = a.charCodeAt(i);
        fd.append('imagen', new Blob([u], {type: mt}), 'factura.jpg');
        var r = await fetch('/facturas/analizar', {method:'POST', body:fd});
        var d = await r.json();
        if (d.error) throw new Error(d.error);
        dat = d;
        mostrar(d);
        e.style.display = 'none';
    } catch(ex) {
        e.className = 'st se';
        e.textContent = 'Error: ' + ex.message;
    }
    document.getElementById('ba').disabled = false;
}

function mostrar(d) {
    document.getElementById('zc').style.display = 'none';
    document.getElementById('zr').style.display = 'block';
    var items = [
        ['Proveedor', d.proveedor || '-'],
        ['Folio', d.folio || '-'],
        ['Fecha', d.fecha || '-'],
        ['Vence', d.fecha_vencimiento || '-'],
        ['Credito', (d.dias_credito || '-') + ' dias'],
        ['Total', fmt(d.total)]
    ];
    document.getElementById('ig').innerHTML = items.map(function(x) {
        return '<div class="ii"><div class="il">' + x[0] + '</div><div class="iv">' + x[1] + '</div></div>';
    }).join('');
    document.getElementById('tb').innerHTML = (d.productos || []).map(function(p) {
        var nomProd=p.producto_nombre||p.nombre||p.descripcion||'-';var selOpts='';if(p.candidatos&&p.candidatos.length>0){selOpts='<br><select style="font-size:.75rem;width:100%;margin-top:3px" onchange="window._cands=window._cands||{};window._cands[p.barcode||p.descripcion]=parseInt(this.value)">'+p.candidatos.map(function(c){return '<option value="'+c.id+'"'+(c.id==p.producto_id?' selected':'')+'>'+c.nombre+'</option>';}).join('')+'</select>';}var badge=p.encontrado?'<small style="color:#1a7a4a"> en Odoo</small>':'<small style="color:#e67e22"> '+p.descripcion.substring(0,30)+'</small>';return '<tr><td>'+nomProd+selOpts+'<br>'+badge+'</td><td>'+p.cantidad+'</td><td>'+fmt(p.precio_unitario)+'</td><td>'+fmt(p.subtotal)+'</td></tr>';
    }).join('');
    document.getElementById('ts').textContent = fmt(d.subtotal);
    document.getElementById('ti').textContent = fmt(d.iva);
    document.getElementById('tt').textContent = fmt(d.total);
}

async function confirmar() {
    if (!dat) return;
    var e = document.getElementById('sc');
    e.className = 'st sc';
    e.style.display = 'block';
    e.textContent = 'Registrando en Odoo...';
    try {
        var r = await fetch('/facturas/confirmar', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(dat)
        });
        var d = await r.json();
        e.className = 'st so';
        e.textContent = d.mensaje || 'Guardado en Odoo';
        document.querySelector('.ac').style.display = 'none';
    } catch(ex) {
        e.className = 'st se';
        e.textContent = 'Error: ' + ex.message;
    }
}

function reiniciar() {
    b64 = null; dat = null;
    document.getElementById('pv').style.display = 'none';
    document.getElementById('ba').style.display = 'none';
    document.getElementById('sa').style.display = 'none';
    document.getElementById('sc').style.display = 'none';
    document.getElementById('zr').style.display = 'none';
    document.getElementById('zc').style.display = 'block';
    document.getElementById('fi').value = '';
}

function esXML(f){return f.name.toLowerCase().endsWith('.xml');}
function cargarXML(file){
  var sa=document.getElementById('sa');
  sa.style.display='block';sa.className='st so';sa.textContent='Leyendo XML: '+file.name+'...';
  var reader=new FileReader();
  reader.onload=function(e){
    sa.textContent='Enviando a Claudio...';
    var fd=new FormData();
    fd.append('xml',new Blob([e.target.result],{type:'text/xml'}),file.name);
    fetch('/facturas/analizar-xml',{method:'POST',body:fd})
    .then(function(res){return res.json();})
    .then(function(data){
      if(data.error){sa.className='st se';sa.textContent='Error: '+data.error;return;}
      mostrar(data);
    })
    .catch(function(err){sa.className='st se';sa.textContent='Error: '+String(err);});
  };
  reader.readAsText(file,'utf-8');
}
var _cargarOrig=cargar;
function cargar(input){
  var files=Array.from(input.files);
  var xmlF=files.find(function(f){return esXML(f);});
  if(xmlF){cargarXML(xmlF);return;}
  _cargarOrig.call(this,input);
}

</script>
</body>
</html>
