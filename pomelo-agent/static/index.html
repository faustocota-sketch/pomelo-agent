<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Claudio · Pomelo Derma</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root{--cream:#FAF7F2;--pomelo:#E8593C;--pomelo-l:#FDF0EC;--pomelo-d:#C43E24;--dark:#1A1410;--mid:#7A6E68;--border:#EDE8E0;--white:#fff;--green:#2D7D52;--green-bg:#EDF7F2}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:var(--white);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{width:34px;height:34px;background:var(--pomelo);border-radius:9px;display:flex;align-items:center;justify-content:center;color:white;font-family:'DM Serif Display',serif;font-size:17px}
.logo-info{}
.logo-name{font-family:'DM Serif Display',serif;font-size:17px;line-height:1.1}
.logo-sub{font-size:11px;color:var(--mid);font-weight:300}
.status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--green);background:var(--green-bg);padding:5px 12px;border-radius:20px}
.dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.layout{display:flex;flex:1;overflow:hidden}
.sidebar{width:240px;background:var(--white);border-right:1px solid var(--border);padding:14px;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column;gap:6px}
.s-label{font-size:10px;font-weight:500;color:var(--mid);text-transform:uppercase;letter-spacing:.07em;padding:4px 0 2px}
.qbtn{width:100%;text-align:left;background:none;border:1px solid var(--border);border-radius:8px;padding:9px 11px;font-family:'DM Sans',sans-serif;font-size:12.5px;color:var(--dark);cursor:pointer;transition:all .15s;line-height:1.4}
.qbtn:hover{background:var(--pomelo-l);border-color:var(--pomelo);color:var(--pomelo-d)}
.sep{height:1px;background:var(--border);margin:4px 0}
.chat{flex:1;display:flex;flex-direction:column;overflow:hidden}
.msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px;max-width:700px}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.av{width:30px;height:30px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px}
.av.ai{background:var(--pomelo);color:white;font-family:'DM Serif Display',serif}
.av.user{background:var(--dark);color:white}
.bubble{padding:11px 15px;border-radius:11px;font-size:13.5px;line-height:1.65;max-width:540px}
.msg.ai .bubble{background:var(--white);border:1px solid var(--border);border-radius:4px 11px 11px 11px}
.msg.user .bubble{background:var(--dark);color:white;border-radius:11px 4px 11px 11px}
.action-tag{margin-top:8px;padding:7px 11px;background:var(--green-bg);border:1px solid #b8dfc8;border-radius:7px;font-size:12px;color:var(--green);font-weight:500}
.typing .bubble{display:flex;gap:5px;align-items:center}
.tdot{width:7px;height:7px;background:var(--mid);border-radius:50%;animation:bop .7s infinite}
.tdot:nth-child(2){animation-delay:.15s}
.tdot:nth-child(3){animation-delay:.3s}
@keyframes bop{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
.welcome{text-align:center;padding:48px 20px;max-width:420px;margin:auto}
.w-icon{width:52px;height:52px;background:var(--pomelo);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:white;font-family:'DM Serif Display',serif;font-size:26px}
.w-title{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:8px}
.w-sub{font-size:14px;color:var(--mid);line-height:1.6}
.input-area{padding:14px 20px 18px;background:var(--white);border-top:1px solid var(--border);flex-shrink:0}
.input-box{display:flex;gap:8px;align-items:flex-end;background:var(--cream);border:1.5px solid var(--border);border-radius:11px;padding:9px 11px;transition:border-color .15s}
.input-box:focus-within{border-color:var(--pomelo)}
textarea{flex:1;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--dark);resize:none;outline:none;line-height:1.5;max-height:110px;min-height:22px}
textarea::placeholder{color:var(--mid)}
.send{width:34px;height:34px;background:var(--pomelo);border:none;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s}
.send:hover{background:var(--pomelo-d)}
.send:disabled{background:var(--border);cursor:not-allowed}
.hint{font-size:11px;color:var(--mid);margin-top:7px;text-align:center}
</style>
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-mark">C</div>
    <div class="logo-info">
      <div class="logo-name">Claudio</div>
      <div class="logo-sub">Agente IA · Pomelo Derma</div>
    </div>
  </div>
  <div class="status"><div class="dot"></div>Odoo conectado</div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="s-label">Acciones rápidas</div>
    <button class="qbtn" onclick="enviar('¿Cuántos productos tengo en Odoo?')">📦 Ver productos</button>
    <button class="qbtn" onclick="enviar('Muéstrame mis clientes')">👥 Ver clientes</button>
    <button class="qbtn" onclick="enviar('¿Cuáles son mis facturas recientes?')">🧾 Ver facturas</button>
    <div class="sep"></div>
    <div class="s-label">Crear</div>
    <button class="qbtn" onclick="enviar('Quiero crear un producto nuevo')">➕ Nuevo producto</button>
    <button class="qbtn" onclick="enviar('Quiero agregar un cliente nuevo')">➕ Nuevo cliente</button>
    <button class="qbtn" onclick="enviar('Quiero crear una factura')">➕ Nueva factura</button>
    <div class="sep"></div>
    <div class="s-label">Reportes</div>
    <button class="qbtn" onclick="enviar('Dame un resumen del estado actual del negocio')">📊 Resumen general</button>
    <button class="qbtn" onclick="enviar('¿Qué productos tienen precio más alto?')">💰 Productos por precio</button>
  </div>

  <div class="chat">
    <div class="msgs" id="msgs">
      <div class="welcome" id="welcome">
        <div class="w-icon">C</div>
        <div class="w-title">Hola, soy Claudio</div>
        <div class="w-sub">Tu agente IA conectado a Odoo. Dime qué necesitas — facturas, productos, clientes — y lo hago por ti.</div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="inp" placeholder="Ej: Crea una factura para Fausto Cota por Tretinoin 0.05% x2..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"
          oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"></textarea>
        <button class="send" id="sendbtn" onclick="send()">
          <svg viewBox="0 0 20 20" fill="white" width="15" height="15"><path d="M2 10l16-8-6 8 6 8z"/></svg>
        </button>
      </div>
      <div class="hint">Enter para enviar · Shift+Enter para nueva línea</div>
    </div>
  </div>
</div>

<script>
let historial = [];
let esperando = false;

function enviar(texto) {
  document.getElementById('inp').value = texto;
  send();
}

function addMsg(rol, texto, accion) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = `msg ${rol}`;

  const av = document.createElement('div');
  av.className = `av ${rol}`;
  av.textContent = rol === 'ai' ? 'C' : '👤';

  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.style.whiteSpace = 'pre-wrap';
  bub.textContent = texto;

  if (accion) {
    const tag = document.createElement('div');
    tag.className = 'action-tag';
    tag.textContent = accion;
    bub.appendChild(tag);
  }

  div.appendChild(av);
  div.appendChild(bub);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addTyping() {
  const msgs = document.getElementById('msgs');
  const div = document.createElement('div');
  div.className = 'msg ai typing';
  div.id = 'typing';
  div.innerHTML = `<div class="av ai">C</div><div class="bubble"><div class="tdot"></div><div class="tdot"></div><div class="tdot"></div></div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function send() {
  if (esperando) return;
  const inp = document.getElementById('inp');
  const texto = inp.value.trim();
  if (!texto) return;

  inp.value = '';
  inp.style.height = 'auto';
  esperando = true;
  document.getElementById('sendbtn').disabled = true;

  addMsg('user', texto);
  historial.push({role: 'user', content: texto});
  addTyping();

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({mensaje: texto, historial: historial.slice(-10)})
    });
    const data = await r.json();
    removeTyping();
    addMsg('ai', data.respuesta, data.accion);
    historial.push({role: 'assistant', content: data.respuesta});
  } catch(e) {
    removeTyping();
    addMsg('ai', '❌ Error de conexión. Verifica que el servidor esté corriendo.');
  }

  esperando = false;
  document.getElementById('sendbtn').disabled = false;
  document.getElementById('inp').focus();
}
</script>
</body>
</html>
